cv_bullets:
  - Przejąłem dział serwisu po odejściu kierownika i części zespołu, stabilizując jego funkcjonowanie oraz utrzymując kluczowych ekspertów.
  - Wdrożyłem model współpracy Tier 1 / Tier 2 wspierający transfer wiedzy i efektywne wykorzystanie kompetencji ekspertów.
  - Zbudowałem kulturę współpracy opartą na odpowiedzialności, wsparciu i orientacji na klienta.
  - Przeprowadziłem trudne decyzje personalne oraz wypracowałem bardziej dojrzałe podejście do równoważenia zaufania, odpowiedzialności i kontroli.
