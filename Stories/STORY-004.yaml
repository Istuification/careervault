cv_bullets:
  - Stworzyłem system analizy operacyjnej serwisu umożliwiający podejmowanie decyzji przy niemal całkowitym braku danych historycznych.
  - Obaliłem kluczowe założenia organizacyjne i zidentyfikowałem rzeczywiste przyczyny przeciążenia działu obsługującego ponad 50 000 urządzeń.
  - Zaprojektowałem model działania serwisu wspierający wzrost liczby urządzeń do około 70 000 bez utraty kluczowych kompetencji technicznych.
  - Wdrożyłem metryki i model zarządzania wykorzystywane przez kolejnych kierowników serwisu.
