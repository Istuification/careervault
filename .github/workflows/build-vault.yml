name: Build and deploy Career Vault to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # Kluczowe: pozwala akcji na zapis (push) na branch gh-pages

concurrency:
  group: pages-branch
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Indeks MUSI powstac przed build_vault.py -- tamten wciaga go
      # do plikow zbiorczych i kopiuje do dist/.
      - name: Build VaultShot index
        run: python scripts/build_index.py

      - name: Build site (dist/)
        run: python scripts/build_vault.py

      # Indeks jest artefaktem generowanym, ale trzymamy go w repo, zeby byl
      # widoczny na GitHubie bez wchodzenia na Pages. Commit tylko gdy sie zmienil.
      - name: Commit regenerated index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "Vaultshot index.md"
          git diff --staged --quiet || git commit -m "chore: regenerate VaultShot index [skip ci]"
          git push

      - name: Ensure .nojekyll
        run: |
          mkdir -p dist
          touch dist/.nojekyll

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "Deploy Career Vault (${{ github.sha }})"
