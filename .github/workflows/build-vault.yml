name: Build and deploy Career Vault to Pages

# Kiedy workflow ma sie uruchomic:
# - przy kazdym pushu na main (czyli tez przy kazdym nowym "entry")
# - recznie, z zakladki Actions (workflow_dispatch)
on:
  push:
    branches: [main]
  workflow_dispatch:

# Uprawnienia potrzebne do publikacji na GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Nie odpalaj kilku deployow rownolegle
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repozytorium
        uses: actions/checkout@v5

      - name: Ustaw Pythona
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Zbuduj zbiorczy plik Vaulta
        run: python scripts/build_vault.py

      - name: Wyslij artefakt do Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publikuj na GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
