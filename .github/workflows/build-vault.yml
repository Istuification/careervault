name: Build and deploy Career Vault to Pages

# Kiedy workflow ma sie uruchomic:
# - przy kazdym pushu na main (czyli tez przy kazdym nowym "entry")
# - recznie, z zakladki Actions (workflow_dispatch)
on:
  push:
    branches: [main]
  workflow_dispatch:

# Tryb "deploy from branch": workflow buduje dist/ i pushuje go na galaz gh-pages.
# GitHub Pages serwuje strone bezposrednio z tej galezi. Dzieki temu OMIJAMY
# akcje deploy-pages i cala kolejke deploymentow Pages (zrodlo problemu z
# "deployment_queued"). Do pushu na galaz wystarczy uprawnienie do zapisu tresci.
permissions:
  contents: write

# Nie odpalaj kilku buildow rownolegle; nowy push anuluje starszy, wciaz trwajacy.
concurrency:
  group: pages-branch
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repozytorium
        uses: actions/checkout@v5

      - name: Ustaw Pythona
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Zbuduj strone (dist/)
        run: python scripts/build_vault.py

      # Wylacza domyslne przetwarzanie Jekyll na Pages (serwuje pliki 1:1).
      - name: Dodaj .nojekyll
        run: touch dist/.nojekyll

      - name: Publikuj na galaz gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "Deploy Career Vault (${{ github.sha }})"
