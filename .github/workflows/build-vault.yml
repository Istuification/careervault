name: Build and deploy Career Vault to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # Kluczowe: pozwala akcji na zapis (push) na branch gh-pages

concurrency:
  group: pages-branch
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Jeden krok zamiast trzech. build.py wczytuje Vault raz, waliduje go,
      # a nastepnie po kolei generuje: sekcje README, Vaultshot index i dist/.
      # Kolejnosc jest wymuszona wewnatrz skryptu -- indeks musi powstac przed
      # strona, bo trafia do plikow zbiorczych.
      - name: Build Vault (README + index + dist/)
        run: python scripts/build.py

      # Artefakty generowane trzymamy w repo, zeby byly czytelne na GitHubie
      # bez wchodzenia na Pages. Commit tylko gdy cos sie realnie zmienilo.
      - name: Commit regenerated artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "Vaultshot index.md" \
                  "Achievements/README.md" \
                  "Skills/README.md" \
                  "Stories/README.md" \
                  "Development Areas/README.md" \
                  "Assessments/Predictors/README.md" \
                  "Assessments/Behavioral Patterns/README.md"
          git diff --staged --quiet || git commit -m "chore: regenerate Vault artifacts [skip ci]"
          git push

      - name: Ensure .nojekyll
        run: |
          mkdir -p dist
          touch dist/.nojekyll

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "Deploy Career Vault (${{ github.sha }})"
