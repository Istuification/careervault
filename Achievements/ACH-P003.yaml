situation: >
  Przygotowanie zaręczyn i wesela wymagało
  koordynacji wielu osób, zachowania poufności,
  przygotowania harmonogramów, budżetu, logistyki,
  oprawy muzycznej oraz scenariusza zabaw i atrakcji
  dla gości.

actions:
  - zaprojektowanie przebiegu zaręczyn jako wieloetapowego wydarzenia
  - przygotowanie poufnego planu komunikacji z organizatorami i uczestnikami
  - przypisanie ról pomocniczych i odpowiedzialności
  - stworzenie harmonogramu działań i planu awaryjnego
  - przygotowanie mapy wydarzenia i punktów operacyjnych
  - budżetowanie wesela i monitorowanie wydatków
  - prowadzenie listy gości i statusów potwierdzeń
  - planowanie harmonogramu dnia ślubu i wesela
  - dobór muzyki i budowa playlisty
  - projektowanie zabaw weselnych, rekwizytów i zasad
  - przygotowanie materiałów organizacyjnych dla współorganizatorów

impact:
  - przeprowadzenie dwóch złożonych wydarzeń rodzinnych w sposób uporządkowany
  - ograniczenie chaosu organizacyjnego poprzez jasny podział ról
  - stworzenie budżetu i kontroli kosztów dla wesela
  - przygotowanie spójnej oprawy muzycznej i rozrywkowej
  - zaprojektowanie atrakcji, które można było łatwo uruchomić podczas wydarzenia
  - zwiększenie przewidywalności i bezpieczeństwa całego procesu

importance: 9

evidence:
  - dokument zaręczyn z podziałem na role, harmonogram i plan awaryjny
  - dokument z opisami zabaw weselnych i rekwizytów
  - arkusz budżetowy wesela
  - arkusz z listą gości
  - arkusz z playlistą weselną
  - harmonogram przygotowań i dnia ślubu
  - koordynacja przez WhatsApp i Zoom

