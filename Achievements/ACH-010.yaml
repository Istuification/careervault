id: ACH-010

title: Projektowanie organizacji na podstawie analizy danych operacyjnych

company: KIPI

period:
  start: 2023-09
  end: 2025-01

roles:
  - acting-service-manager

skills:
  - operational-analysis
  - organizational-design
  - data-analysis
  - workforce-planning
  - systems-thinking

themes:
  - data-driven-decisions
  - organizational-design
  - scaling
  - leadership

situation: >
  Wraz ze wzrostem liczby zgłoszeń serwisowych
  konieczne było określenie rzeczywistego
  obciążenia działu oraz przygotowanie podstaw
  do dalszego rozwoju organizacyjnego.

actions:
  - analiza danych serwisowych
  - identyfikacja najczęstszych problemów
  - analiza obciążenia zespołu
  - określanie potrzeb personalnych
  - projektowanie struktury organizacyjnej
  - definiowanie kompetencji stanowisk

impact:
  - lepsze zrozumienie obciążenia działu
  - wsparcie decyzji kadrowych
  - przygotowanie skalowalnej struktury organizacyjnej
  - identyfikacja kluczowych wąskich gardeł
  - przejście serwisu z zarządzania intuicyjnego na oparte na danych - pierwszy system KPI działu
  - zespół ustabilizowany na 5 specjalistach i kierowniku zamiast zakładanych wcześniej ok. 8 etatów, z dobrą retencją i delegowaniem części czasu ekspertów do wsparcia R&D

importance: 8

evidence:
  - analizy obciążenia
  - rekomendacje kadrowe
  - projekt struktury działu
  - mapowanie kompetencji

star_candidates:
  - analytical-thinking
  - organizational-design
  - scaling
  - decision-making

fin:
  - id: FIN-010
    value_type: Cost Avoidance
    estimated_value:
      annual_pln: 85000-120000
    calculation: >
      1 uniknięty etat specjalisty serwisu
      × orientacyjny koszt pracodawcy 7000-10000 PLN/mies.
      × 12 miesięcy
    assumptions:
      - wzrost liczby obsługiwanych urządzeń ok. 20% rocznie
      - przed projektem serwis utracił większość doświadczonego zespołu z powodu przeciążenia
      - bez przebudowy modelu działania dalsze skalowanie wymagałoby zwiększania zatrudnienia
      - projekt zwiększył przepustowość organizacyjną bez proporcjonalnego wzrostu liczby specjalistów
      - wycena obejmuje wyłącznie konserwatywny scenariusz uniknięcia jednego dodatkowego etatu (argumentowalne 2-3)
      - nie obejmuje kosztów rekrutacji, wdrożenia, rotacji ani utraconej produktywności nowych pracowników
      - nie obejmuje wartości pracy ekspertów uwolnionej na działania R&D
    confidence: medium
    note: >
      Szacunek własny metodą Cost Avoidance;
      nie są to dane księgowe firmy.
