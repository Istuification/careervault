situation: >
  Dynamiczny rozwój organizacji powodował powstawanie
  dokumentacji w różnych formatach i standardach.
  Konieczne było uporządkowanie dokumentów wspierających
  sprzedaż, serwis, gwarancję oraz rozwój produktów.

actions:
  - przygotowanie dokumentacji technicznej
  - tworzenie dokumentacji DTR
  - standaryzacja warunków gwarancyjnych
  - opracowanie protokołów serwisowych
  - opracowanie protokołów montażowych
  - przygotowanie regulaminów i umów
  - współpraca z działami technicznymi i prawnikami

impact:
  - stworzenie jednolitych standardów dokumentacyjnych wspierających wiele obszarów organizacji
  - ograniczenie ryzyka błędnych interpretacji procedur i zasad współpracy
  - usprawnienie wdrażania nowych produktów, procesów i partnerów
  - zwiększenie spójności komunikacji pomiędzy organizacją, klientami i partnerami
  - wsparcie skalowania organizacji poprzez formalizację wiedzy operacyjnej i produktowej

