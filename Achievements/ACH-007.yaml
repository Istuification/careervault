  - samodzielne poznanie technologii VOIP
  - wybór rozwiązania Zadarma
  - konfiguracja centrali telefonicznej
  - projektowanie routingu połączeń
  - integracja systemu z Bitrix24
  - wdrożenie workflow obsługi zgłoszeń telefonicznych
  - konfiguracja komunikacji między działami
  - uruchomienie rozwiązania produkcyjnego

impact:
  - uporządkowanie obsługi połączeń przychodzących
  - usprawnienie kierowania zgłoszeń do właściwych osób
  - integracja komunikacji telefonicznej z procesami operacyjnymi
  - stworzenie rozwiązania możliwego do skalowania w organizacji
  - wdrożenie rozwiązania również w BOK i dziale Instal

