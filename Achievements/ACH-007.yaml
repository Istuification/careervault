  Dział serwisu potrzebował uporządkowanego systemu
  obsługi połączeń telefonicznych oraz lepszego
  kierowania zgłoszeń do właściwych osób.
  W organizacji brakowało spójnego rozwiązania
  zintegrowanego z istniejącymi procesami.

