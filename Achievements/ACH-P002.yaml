situation: >
  W celu integracji społeczności oraz stworzenia
  wartościowej formy wypoczynku rozpocząłem organizację
  cyklicznych, kilkudniowych spływów kajakowych
  wymagających samodzielnego zaprojektowania procesu,
  koordynacji uczestników oraz zarządzania logistyką.

actions:
  - projektowanie przebiegu wydarzeń
  - planowanie wielodniowych tras
  - organizacja noclegów i atrakcji
  - negocjacje z dostawcami usług
  - przygotowanie budżetów i rozliczeń
  - zarządzanie listą uczestników
  - organizacja komunikacji uczestników
  - przygotowanie dokumentacji organizacyjnej
  - koordynacja transportu uczestników pomiędzy wieloma lokalizacjami
  - organizacja kierowców oraz pojazdów wspierających wydarzenie
  - przygotowanie procedur awaryjnych i komunikacji kryzysowej
  - monitorowanie lokalizacji uczestników podczas podróży i wydarzenia
  - planowanie bezpieczeństwa i zarządzanie ryzykiem
  - tworzenie materiałów informacyjnych
  - organizacja działań po zakończeniu wydarzenia

impact:
  - organizacja cyklicznych, czterodniowych wydarzeń dla 20–30 uczestników
  - koordynacja logistyki obejmującej transport, noclegi i działania terenowe
  - stworzenie powtarzalnego procesu organizacyjnego wykorzystywanego przez kolejne lata
  - przygotowanie procedur ograniczających ryzyko organizacyjne i bezpieczeństwa
  - budowanie zaangażowanej społeczności liczącej łącznie ponad 140 uczestników na przestrzeni kilku lat

