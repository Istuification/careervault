name: Stakeholder Management

category: Management

importance: 9

level: Advanced

summary: >
  Budowanie i utrzymywanie skutecznej współpracy
  pomiędzy osobami, zespołami oraz organizacjami
  posiadającymi różne cele, potrzeby i oczekiwania.
  Obejmuje identyfikację interesariuszy,
  uzgadnianie priorytetów, rozwiązywanie konfliktów
  oraz przekładanie perspektyw różnych grup na
  wspólne rozwiązania.

