id: SKILL-021

name: Systems Thinking

category: Systems

importance: 10

level: Expert

summary: >
  Analizowanie organizacji, procesów i problemów jako połączonych
  systemów zamiast odizolowanych zdarzeń. Obejmuje mapowanie
  zależności między elementami, docieranie do przyczyny źródłowej
  zamiast do objawu, przeramowanie problemu, gdy postawiona
  diagnoza dotyczy skutku, oraz projektowanie rozwiązań
  odpornych na zmianę warunków i rotację ludzi. Kompetencja
  przekrojowa - stanowi warstwę myślenia poprzedzającą projektowanie
  procesu, architektury informacji i modelu organizacyjnego,
  dlatego jej dowody pochodzą z różnych domen: systemów
  operacyjnych, baz wiedzy, architektury aplikacji i projektów
  własnych.

