id: SKILL-018

name: Persuasive Communication

category: Communication

importance: 8

level: Advanced

summary: >
  Systematyczne prowadzenie perswazyjnych konwersacji
  z osobami o zróżnicowanych postawach, poziomach
  otwartości i profilach emocjonalnych. Obejmuje
  inicjowanie kontaktu w warunkach zimnego rynku,
  diagnozowanie rzeczywistych potrzeb i obaw rozmówcy,
  zarządzanie obiekcjami bez wywoływania oporu,
  kognitywne przeformułowanie punktu widzenia oraz
  utrzymanie długoterminowej odporności psychologicznej
  w środowisku wysokiego współczynnika odrzucenia.

