id: SKILL-017

name: Cross-Functional Facilitation

category: Communication

importance: 8

level: Advanced

summary: >
  Wspieranie organizacji poprzez tłumaczenie złożonych problemów, nadawanie im
  kontekstu, porządkowanie perspektyw i pomaganie zespołom w dochodzeniu do
  praktycznych rozwiązań. Kompetencja obejmuje nieformalny advisory, spokojne
  prowadzenie rozmów, interpretację napięć międzydziałowych oraz łączenie ludzi
  wokół wspólnego rozumienia problemu.

